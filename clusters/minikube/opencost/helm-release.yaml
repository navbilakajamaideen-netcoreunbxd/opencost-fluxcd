apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 5m
  chart:
    spec:
      chart: opencost
      version: "1.35.0" # or latest
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: opencost
  values:
    prometheus:
      service:
        name: prometheus-kube-prometheus-prometheus
        namespace: monitoring
