apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: opencost-exporter
  namespace: opencost-exporter
spec:
  interval: 30m

  chart:
    spec:
      chart: prometheus-opencost-exporter
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

  values:
    service:
      port: 9003

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
